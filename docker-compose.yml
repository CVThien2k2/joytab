services:
  postgres:
    image: postgres:16-alpine
    container_name: joytab-postgres
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-joytab}
    volumes:
      - joytab_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: joytab-redis
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-redis_password}']
    volumes:
      - joytab_redis_data:/data

volumes:
  joytab_postgres_data:
  joytab_redis_data:
